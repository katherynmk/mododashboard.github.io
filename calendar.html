<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendar — MODO8 Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* ── CALENDAR PAGE STYLES ── */
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2rem 2.5rem 1.2rem;
      border-bottom: 1.5px solid var(--border);
      background: var(--off-white);
      position: sticky; top: 58px; z-index: 50;
    }
    .cal-nav-month {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .cal-nav-month em {
      font-style: normal;
      color: var(--neon-dim);
    }
    .cal-nav-btns {
      display: flex; gap: 0.5rem;
    }
    .cal-nav-btns button {
      background: var(--white);
      border: 1.5px solid var(--border);
      color: var(--text-sub);
      font-family: var(--mono);
      font-size: 0.9rem;
      width: 36px; height: 36px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-nav-btns button:hover {
      border-color: var(--neon);
      color: var(--neon-dim);
    }
    .cal-nav-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── LEGEND ── */
    .cal-legend {
      display: flex; gap: 1.2rem; flex-wrap: wrap; align-items: center;
      padding: 0.9rem 2.5rem;
      border-bottom: 1.5px solid var(--border);
      background: var(--white);
    }
    .legend-item {
      display: flex; align-items: center; gap: 0.4rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── CALENDAR GRID ── */
    .cal-section {
      padding: 2.5rem 2.5rem 3rem;
    }
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      margin-bottom: 1px;
    }
    .cal-weekday {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0.5rem 0.6rem;
      text-align: center;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .cal-cell {
      background: var(--white);
      min-height: 110px;
      padding: 0.5rem 0.6rem;
      display: flex; flex-direction: column; gap: 0.3rem;
      transition: background 0.15s;
    }
    .cal-cell:hover { background: var(--off-white); }
    .cal-cell.other-month {
      background: #fafafa;
    }
    .cal-cell.other-month .cal-day-num { color: #ccc; }
    .cal-cell.today {
      background: #f0fff6;
    }
    .cal-cell.today .cal-day-num {
      background: var(--neon);
      color: #0a1a0a;
      border-radius: 50%;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
    }
    .cal-day-num {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 0.1rem;
    }
    .cal-events {
      display: flex; flex-direction: column; gap: 2px;
    }
    .cal-event {
      font-size: 0.67rem;
      font-weight: 600;
      padding: 0.18rem 0.4rem;
      border-radius: 3px;
      line-height: 1.3;
      cursor: default;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }
    /* status colors for events */
    .cal-event.no-downpayment  { background: rgba(239,68,68,0.12);  color: #dc2626; border-left: 2px solid #ef4444; }
    .cal-event.pre-procurement { background: rgba(59,130,246,0.12); color: #1d4ed8; border-left: 2px solid #3b82f6; }
    .cal-event.engineering     { background: rgba(245,158,11,0.12); color: #d97706; border-left: 2px solid #f59e0b; }
    .cal-event.production      { background: rgba(34,197,94,0.12);  color: #15803d; border-left: 2px solid #22c55e; }
    .cal-event.done            { background: rgba(0,0,0,0.06);      color: #333;    border-left: 2px solid #555; }
    .cal-event.purchasing      { background: rgba(107,114,128,0.12);color: #374151; border-left: 2px solid #6b7280; }
    .cal-event.pulling         { background: rgba(236,72,153,0.12); color: #be185d; border-left: 2px solid #ec4899; }

    /* ── EMPTY MONTH MESSAGE ── */
    .cal-empty {
      text-align: center;
      padding: 3rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    /* ── UPCOMING LIST (below calendar) ── */
    .upcoming-header {
      padding: 0 2.5rem 1rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-top: 1.5px solid var(--border);
      padding-top: 2rem;
    }
    .upcoming-list {
      padding: 0 2.5rem 3rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .upcoming-item {
      display: flex; align-items: baseline; gap: 1rem;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      transition: border-color 0.15s;
    }
    .upcoming-item:hover { border-color: var(--neon); }
    .upcoming-date {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      min-width: 80px;
      flex-shrink: 0;
    }
    .upcoming-project {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text);
      min-width: 120px;
      flex-shrink: 0;
    }
    .upcoming-desc {
      font-size: 0.82rem;
      color: var(--text-sub);
      flex: 1;
    }
    .upcoming-badge {
      font-family: var(--mono);
      font-size: 0.63rem;
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .upcoming-badge.no-downpayment  { background: rgba(239,68,68,0.1);  color: #dc2626; }
    .upcoming-badge.pre-procurement { background: rgba(59,130,246,0.1); color: #1d4ed8; }
    .upcoming-badge.engineering     { background: rgba(245,158,11,0.1); color: #d97706; }
    .upcoming-badge.production      { background: rgba(34,197,94,0.1);  color: #15803d; }
    .upcoming-badge.purchasing      { background: rgba(107,114,128,0.1);color: #374151; }
    .upcoming-badge.pulling         { background: rgba(236,72,153,0.1); color: #be185d; }

    @media (max-width: 680px) {
      .cal-section { padding: 1rem; }
      .cal-nav, .cal-legend, .upcoming-header, .upcoming-list { padding-left: 1rem; padding-right: 1rem; }
      .cal-cell { min-height: 70px; padding: 0.3rem; }
      .cal-event { font-size: 0.6rem; padding: 0.12rem 0.3rem; }
      .upcoming-item { flex-wrap: wrap; gap: 0.3rem; }
    }
  </style>
</head>

<script>
  // ── Events derived from project data ──
  // Pipeline logic per project (working backwards from ship date):
  //   Ship date                    = known
  //   Production start             = ship - 18 days (~2.5 wks)
  //   Parts must arrive / ordered  = production start (parts order placed 4 wks prior)
  //   Parts order placed           = production start - 28 days
  //   Purchasing sends order       = engineering complete + 7 days
  //   Engineering due              = parts order date - 7 days (purchasing window)
  //   Pre-procurement / DP trigger = engineering start (noted where applicable)

  const events = [

    // ─────────────────────────────────────────

    { date: '2026-06-15', project: 'OCADO', label: '💵 Invoice $109K — Ship',  status: 'production' },

    // ─────────────────────────────────────────

    // ─────────────────────────────────────────

    { date: '2026-07-07', project: 'FRONTIER', label: '📥 Parts Arrive / Prod Start', status: 'purchasing' },
    { date: '2026-07-20', project: 'FRONTIER', label: '🚢 Ship Date',             status: 'purchasing' },
    { date: '2026-07-20', project: 'FRONTIER', label: '💵 Invoice $35K — Ship',   status: 'purchasing' },

    // ─────────────────────────────────────────
    // CONVEYOR ON CASTERS  |  Ship: Aug 3  |  status: purchasing
    // ─────────────────────────────────────────
    // Eng info → purchasing Jun 16 → parts order Jun 23 → parts arrive Jul 21 → production Jul 21–Aug 3

    { date: '2026-06-23', project: 'COC', label: '🛒 Parts Order Placed',       status: 'purchasing' },
    { date: '2026-07-21', project: 'COC', label: '📥 Parts Arrive / Prod Start',status: 'purchasing' },
    { date: '2026-08-03', project: 'COC', label: '🚢 Ship Date',                status: 'purchasing' },
    { date: '2026-08-03', project: 'COC', label: '💵 Freight Invoice',          status: 'purchasing' },

    // PITNEY BOS  |  Ship: Jul 27  |  status: engineering
    // ─────────────────────────────────────────
    // Eng due: Jun 16 → purchasing Jun 23 → parts order Jun 23 → parts arrive Jul 21 → prod Jul 21–27
    { date: '2026-06-16', project: 'PITNEY BOS', label: '📐 Engineering Due',        status: 'engineering' },
    { date: '2026-06-23', project: 'PITNEY BOS', label: '🛒 Parts Order Placed',     status: 'engineering' },
    { date: '2026-07-21', project: 'PITNEY BOS', label: '📥 Parts Arrive / Prod Start', status: 'engineering' },
    { date: '2026-07-27', project: 'PITNEY BOS', label: '🚢 Ship Date',              status: 'engineering' },
    { date: '2026-07-27', project: 'PITNEY BOS', label: '💵 Invoice $68K — Eng',     status: 'engineering' },

    // ─────────────────────────────────────────
    // LOLOI RUGS  |  Ship: Jul 27  |  status: production
    // ─────────────────────────────────────────
    // Production: Jul 9 → Jul 27  |  Parts ordered Jun 11  |  Eng done ~Jun 4
    { date: '2026-06-04', project: 'LOLOI RUGS', label: '📐 Engineering Due',        status: 'production' },
    { date: '2026-06-11', project: 'LOLOI RUGS', label: '🛒 Parts Order Placed',     status: 'production' },
    { date: '2026-07-09', project: 'LOLOI RUGS', label: '📥 Parts Arrive / Prod Start', status: 'production' },

    // ─────────────────────────────────────────

    // → purchasing Jun 27 → parts order Jun 27 → parts arrive Jul 25 → prod Jul 25–31
    { date: '2026-06-10', project: 'NEW HORIZONS', label: '✅ Downpayment Received — Start Eng', status: 'pre-procurement' },
    { date: '2026-06-20', project: 'NEW HORIZONS', label: '📐 Engineering Due',        status: 'pre-procurement' },
    { date: '2026-06-27', project: 'NEW HORIZONS', label: '🛒 Parts Order Placed',     status: 'pre-procurement' },
    { date: '2026-07-25', project: 'NEW HORIZONS', label: '📥 Parts Arrive / Prod Start', status: 'pre-procurement' },
    { date: '2026-07-31', project: 'NEW HORIZONS', label: '🚢 Ship Date',              status: 'pre-procurement' },

    // ─────────────────────────────────────────
    // SPARTAN NASH  |  Ship: Aug 7  |  status: pre-procurement
    // ─────────────────────────────────────────
    // DP received → Eng starts → Eng due Jun 27
    // → purchasing Jul 4 → parts order Jul 4 → parts arrive Aug 1 → prod Aug 1–7
    { date: '2026-06-10', project: 'SPARTAN NASH', label: '✅ Downpayment Received — Start Eng', status: 'pre-procurement' },
    { date: '2026-06-27', project: 'SPARTAN NASH', label: '📐 Engineering Due',        status: 'pre-procurement' },
    { date: '2026-07-04', project: 'SPARTAN NASH', label: '🛒 Parts Order Placed',     status: 'pre-procurement' },

    // If DP received ~Jun 17: Eng due Jul 10 → purchasing Jul 17 → parts Jul 17 → arrive Aug 14 → prod Aug 14–17

    // ─────────────────────────────────────────
    // DP received Jun 8 → Eng due Jun 27 → purchasing Jul 4 → parts order Jul 4 → arrive Aug 1 → prod Aug 1–28
    // (larger system, production ~3.5 wks)
    { date: '2026-06-08', project: 'AMAZON CA', label: '✅ Downpayment Received — Start Eng', status: 'pre-procurement' },
    { date: '2026-06-27', project: 'AMAZON CA', label: '📐 Engineering Due',        status: 'pre-procurement' },
    { date: '2026-07-04', project: 'AMAZON CA', label: '🛒 Parts Order Placed',     status: 'pre-procurement' },
    { date: '2026-08-01', project: 'AMAZON CA', label: '📥 Parts Arrive / Prod Start', status: 'pre-procurement' },

    { date: '2026-08-28', project: 'AMAZON CA', label: '💵 Invoice — Final Ship',   status: 'pre-procurement' },

  // ── Calendar state ──
  const today = new Date();
  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth(); // 0-indexed

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function parseDate(str) {
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m-1, d);
  }

  function renderCalendar() {
    const label = document.getElementById('cal-month-label');
    label.innerHTML = MONTHS[viewMonth] + ' <em>' + viewYear + '</em>';

    const section = document.getElementById('cal-section');
    section.innerHTML = '';

    // Weekday headers
    const wkRow = document.createElement('div');
    wkRow.className = 'cal-weekdays';
    DAYS.forEach(d => {
      const cell = document.createElement('div');
      cell.className = 'cal-weekday';
      cell.textContent = d;
      wkRow.appendChild(cell);
    });
    section.appendChild(wkRow);

    // Grid
    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

    // Prev month fill
    for (let i = firstDay - 1; i >= 0; i--) {
      const cell = buildCell(daysInPrev - i, true, false, []);
      grid.appendChild(cell);
    }

    // This month
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const isToday = (d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear());
      const dayEvents = events.filter(e => e.date === dateStr);
      const cell = buildCell(d, false, isToday, dayEvents);
      grid.appendChild(cell);
    }

    // Next month fill
    const totalCells = firstDay + daysInMonth;
    const remainder = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 1; i <= remainder; i++) {
      const cell = buildCell(i, true, false, []);
      grid.appendChild(cell);
    }

    section.appendChild(grid);

    // Upcoming list
    renderUpcoming();
  }

  function buildCell(dayNum, otherMonth, isToday, dayEvents) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (otherMonth ? ' other-month' : '') + (isToday ? ' today' : '');

    const num = document.createElement('div');
    num.className = 'cal-day-num';
    num.textContent = dayNum;
    cell.appendChild(num);

    if (dayEvents.length > 0) {
      const evtWrap = document.createElement('div');
      evtWrap.className = 'cal-events';
      dayEvents.forEach(ev => {
        const e = document.createElement('div');
        e.className = 'cal-event ' + ev.status;
        e.title = ev.project + ': ' + ev.label;
        e.textContent = ev.project + ' — ' + ev.label;
        evtWrap.appendChild(e);
      });
      cell.appendChild(evtWrap);
    }

    return cell;
  }

  function renderUpcoming() {
    const header = document.getElementById('upcoming-header');
    const list = document.getElementById('upcoming-list');
    list.innerHTML = '';

    const monthEvents = events
      .filter(e => {
        const d = parseDate(e.date);
        return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
      })
      .sort((a,b) => a.date.localeCompare(b.date));

    if (monthEvents.length === 0) {
      header.textContent = 'No milestones this month';
      return;
    }

    header.textContent = MONTHS[viewMonth] + ' ' + viewYear + ' — Milestones';

    monthEvents.forEach(ev => {
      const d = parseDate(ev.date);
      const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      const item = document.createElement('div');
      item.className = 'upcoming-item';
      item.innerHTML =
        '<span class="upcoming-date">' + dateStr + '</span>' +
        '<span class="upcoming-project">' + ev.project + '</span>' +
        '<span class="upcoming-desc">' + ev.label + '</span>' +
        '<span class="upcoming-badge ' + ev.status + '">' + ev.status.replace('-', ' ') + '</span>';
      list.appendChild(item);
    });
  }

  document.getElementById('prev-month').addEventListener('click', () => {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  });
  document.getElementById('next-month').addEventListener('click', () => {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  });
  document.getElementById('today-btn').addEventListener('click', () => {
    viewYear = today.getFullYear();
    viewMonth = today.getMonth();
    renderCalendar();
  });

  document.getElementById('footer-date').textContent =
    new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

  renderCalendar();
</script>
</body>
</html>

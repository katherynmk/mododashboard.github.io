<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasks — MODO8 Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* ── TASKS PAGE ── */
    .tasks-hero {
      padding: 2.5rem 2.5rem 1.5rem;
      border-bottom: 1.5px solid var(--border);
      background: var(--off-white);
      display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    .tasks-hero-left .hero-eyebrow {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--neon-dim);
      margin-bottom: 0.5rem;
    }
    .tasks-hero-left h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .tasks-hero-left h1 em {
      font-style: normal;
      color: var(--neon-dim);
    }
    .tasks-stats {
      display: flex; gap: 2rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .tasks-stats strong { color: var(--text); }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
      padding: 0.9rem 2.5rem;
      border-bottom: 1.5px solid var(--border);
      background: var(--white);
      position: sticky; top: 58px; z-index: 50;
    }
    .filter-label {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-right: 0.3rem;
    }
    .filter-btn {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--neon); color: var(--neon-dim); }
    .filter-btn.active { border-color: var(--neon); background: #f0fff6; color: var(--neon-dim); font-weight: 600; }
    .filter-btn.status-no-downpayment.active  { border-color: #ef4444; background: rgba(239,68,68,0.06); color: #dc2626; }
    .filter-btn.status-pre-procurement.active { border-color: #3b82f6; background: rgba(59,130,246,0.06); color: #1d4ed8; }
    .filter-btn.status-engineering.active     { border-color: #f59e0b; background: rgba(245,158,11,0.06); color: #d97706; }
    .filter-btn.status-production.active      { border-color: #22c55e; background: rgba(34,197,94,0.06); color: #15803d; }
    .filter-btn.status-purchasing.active      { border-color: #6b7280; background: rgba(107,114,128,0.06); color: #374151; }
    .filter-btn.status-pulling.active         { border-color: #ec4899; background: rgba(236,72,153,0.06); color: #be185d; }

    /* ── TASK SECTIONS ── */
    .tasks-container {
      padding: 2rem 2.5rem 4rem;
      display: flex; flex-direction: column; gap: 1.5rem;
    }
    .project-task-block {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .project-task-block:hover { border-color: var(--neon); }

    .ptb-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.4rem;
      background: var(--off-white);
      border-bottom: 1.5px solid var(--border);
      cursor: pointer;
      user-select: none;
      gap: 1rem;
    }
    .ptb-header-left {
      display: flex; align-items: center; gap: 0.85rem;
    }
    .ptb-status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ptb-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
    }
    .ptb-integrator {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .ptb-header-right {
      display: flex; align-items: center; gap: 1rem;
    }
    .ptb-progress {
      display: flex; align-items: center; gap: 0.5rem;
    }
    .ptb-progress-bar {
      width: 80px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .ptb-progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .ptb-progress-text {
      font-family: var(--mono);
      font-size: 0.67rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .ptb-toggle {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    .ptb-toggle.open { transform: rotate(180deg); }

    /* ── TASK LIST ── */
    .ptb-tasks {
      display: flex; flex-direction: column;
    }
    .ptb-tasks.collapsed { display: none; }

    .task-row {
      display: flex; align-items: flex-start; gap: 1rem;
      padding: 0.75rem 1.4rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: var(--off-white); }

    .task-check {
      width: 16px; height: 16px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .task-check:hover { border-color: var(--neon); }
    .task-check.checked {
      background: var(--neon);
      border-color: var(--neon);
    }
    .task-check.checked::after {
      content: '✓';
      font-size: 0.6rem;
      color: #0a1a0a;
      font-weight: 700;
    }
    .task-body {
      flex: 1;
    }
    .task-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }
    .task-title.done {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .task-meta {
      display: flex; gap: 0.75rem; margin-top: 0.2rem; flex-wrap: wrap;
    }
    .task-tag {
      font-family: var(--mono);
      font-size: 0.63rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
    }
    .task-tag.invoice  { background: #f0fff6; color: var(--neon-dim); border: 1px solid #b3ffd9; }
    .task-tag.ops      { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .task-tag.engineering { background: #fff8e6; color: #d97706; border: 1px solid #fde68a; }
    .task-tag.logistics   { background: #faf5ff; color: #9333ea; border: 1px solid #e9d5ff; }
    .task-tag.urgent   { background: #fff1f2; color: #dc2626; border: 1px solid #fecaca; }
    .task-tag.review   { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .task-due {
      font-family: var(--mono);
      font-size: 0.67rem;
      color: var(--text-muted);
    }
    .task-due.overdue  { color: #dc2626; font-weight: 600; }

    /* ── EMPTY STATE ── */
    .tasks-empty {
      text-align: center;
      padding: 4rem 2rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    @media (max-width: 680px) {
      .tasks-container { padding: 1rem 1rem 3rem; }
      .filter-bar, .tasks-hero { padding-left: 1rem; padding-right: 1rem; }
      .ptb-progress { display: none; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo"><span></span>MODO8 Projects</div>
  <ul class="nav-links">
    <li><a href="index.html">All Projects</a></li>
    <li><a href="calendar.html">Calendar</a></li>
    <li><a href="tasks.html">Tasks</a></li>
  </ul>
</nav>

<!-- TASKS HERO -->
<div class="tasks-hero">
  <div class="tasks-hero-left">
    <div class="hero-eyebrow">Project Task Tracker</div>
    <h1><em>Open Tasks</em> by Project</h1>
  </div>
  <div class="tasks-stats">
    <div><strong id="stat-open">—</strong> open</div>
    <div><strong id="stat-done">—</strong> complete</div>
    <div><strong id="stat-projects">—</strong> projects</div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn status-production" data-filter="production">Production</button>
  <button class="filter-btn status-engineering" data-filter="engineering">Engineering</button>
  <button class="filter-btn status-pulling" data-filter="pulling">Pulling</button>
  <button class="filter-btn status-purchasing" data-filter="purchasing">Purchasing</button>
  <button class="filter-btn status-pre-procurement" data-filter="pre-procurement">Pre-Procurement</button>
  <button class="filter-btn status-no-downpayment" data-filter="no-downpayment">No Downpayment</button>
</div>

<!-- TASKS CONTAINER -->
<div class="tasks-container" id="tasks-container"></div>

<footer>
  <span>MODO8 LLC — Internal Use</span>
  <span id="footer-date"></span>
</footer>

<script>
const STATUS_COLORS = {

  'engineering':     '#f59e0b',
  'production':      '#22c55e',
  'done':            '#000000',
  'purchasing':      '#6b7280',
  'pulling':         '#ec4899',

// ── Task data per project ──
// checked: true = complete
const projectTasks = [
  {

      { id: 'actus-4', title: 'Send invoice for initial shipment ($23,013)', tags: ['invoice'], due: 'Jul 1', checked: false },
      { id: 'actus-5', title: 'Confirm July 13 site support schedule with CMES', tags: ['ops'], due: 'Jul 5', checked: false },
      { id: 'actus-6', title: 'Issue change order invoice ($23,076)', tags: ['invoice'], due: null, checked: true },
    ]
  },
  {
    title: 'OCADO',
    integrator: 'Temple Controls',
    status: 'production',
    tasks: [
      { id: 'ocado-1', title: 'Finalize phased shipping & installation plan with Temple Controls', tags: ['ops','urgent'], due: 'Jun 12', checked: false },
      { id: 'ocado-2', title: 'Send invoice for initial shipment ($109,293.07)', tags: ['invoice'], due: 'Jun 15', checked: false },
      { id: 'ocado-3', title: 'Confirm Pleasant Prairie site readiness', tags: ['logistics'], due: 'Jun 13', checked: false },
      { id: 'ocado-4', title: 'Coordinate install downpayment documentation', tags: ['invoice', 'review'], due: null, checked: true },
    ]
  },
  {
    title: 'ADI',
    integrator: 'MALIN',
    status: 'production',
    tasks: [
      { id: 'adi-1', title: 'Coordinate phased shipping to Easton, PA', tags: ['logistics'], due: 'Jun 20', checked: false },
      { id: 'adi-2', title: 'Send invoice for initial shipment ($26,700)', tags: ['invoice'], due: 'Jun 22', checked: false },
      { id: 'adi-3', title: 'Confirm final shipment schedule with MALIN', tags: ['ops'], due: 'Jun 28', checked: false },
      { id: 'adi-4', title: 'Invoice for engineering completion ($83,550)', tags: ['invoice'], due: null, checked: true },
    ]
  },
  {
    title: 'ARHAUS',
    integrator: 'AI',
    status: 'pulling',
    tasks: [
      { id: 'arhaus-1', title: 'Complete job pull — confirm all components staged', tags: ['ops','urgent'], due: 'Jun 25', checked: false },
      { id: 'arhaus-2', title: 'Coordinate freight to Boston Heights, OH', tags: ['logistics'], due: 'Jun 28', checked: false },
      { id: 'arhaus-3', title: 'Send invoice on initial shipment ($9,731)', tags: ['invoice'], due: 'Jul 2', checked: false },
      { id: 'arhaus-4', title: 'Confirm contact: James Coddington 216-276-3956', tags: ['ops'], due: null, checked: false },
    ]
  },
  {
    title: 'FRONTIER DENTAL',
    integrator: 'KPI',
    status: 'purchasing',
    tasks: [
      { id: 'fd-1', title: 'Clarify change order status — confirm scope with KPI', tags: ['ops','urgent'], due: 'Jun 15', checked: false },
      { id: 'fd-2', title: 'Stage conveyor system for North Las Vegas shipment', tags: ['logistics'], due: 'Jul 10', checked: false },
      { id: 'fd-3', title: 'Send final shipment invoice ($35,000)', tags: ['invoice'], due: 'Jul 20', checked: false },
      { id: 'fd-4', title: 'Invoice for initial shipment ($70,000)', tags: ['invoice'], due: null, checked: true },
    ]
  },
  {
    title: 'CONVEYOR ON CASTERS',
    integrator: 'FORMIC',
    status: 'purchasing',
    tasks: [
      { id: 'coc-1', title: 'Generate and send freight invoice to Linthicum Heights, MD', tags: ['invoice','logistics'], due: 'Jul 15', checked: false },
      { id: 'coc-2', title: 'Confirm delivery receipt with FORMIC', tags: ['ops'], due: 'Aug 5', checked: false },
    ]
  },
  {
    title: 'PITNEY BOS',
    integrator: 'Temple Controls',
    status: 'engineering',
    tasks: [
      { id: 'pb-1', title: 'Complete CET drawing — send to Temple Controls for review', tags: ['engineering','urgent'], due: 'Jun 20', checked: false },
      { id: 'pb-2', title: 'Revise drawing per Temple Controls feedback', tags: ['engineering'], due: 'Jun 27', checked: false },
      { id: 'pb-3', title: 'Issue engineering completion invoice ($68,046)', tags: ['invoice'], due: 'Jul 15', checked: false },
      { id: 'pb-4', title: 'Coordinate shipment to Indianapolis, IN', tags: ['logistics'], due: 'Jul 20', checked: false },
      { id: 'pb-5', title: 'Downpayment invoice received ($90,728)', tags: ['invoice'], due: null, checked: true },
    ]
  },
  {
    title: 'LOLOI RUGS',
    integrator: 'AI',
    status: 'production',
    tasks: [
      { id: 'lr-1', title: 'Justin — complete robot programming', tags: ['engineering','urgent'], due: 'Jul 15', checked: false },
      { id: 'lr-2', title: 'QA test conveyor system prior to final ship', tags: ['engineering'], due: 'Jul 22', checked: false },
      { id: 'lr-3', title: 'Coordinate freight to Farmers Branch, TX', tags: ['logistics'], due: 'Jul 24', checked: false },
      { id: 'lr-4', title: 'Send final shipment invoice ($93,563)', tags: ['invoice'], due: 'Jul 27', checked: false },
    ]
  },
  {
    title: 'NEW HORIZONS',
    integrator: 'FORMIC',
    status: 'pre-procurement',
    tasks: [
      { id: 'nh-1', title: 'Reconcile and correct invoicing schedule', tags: ['invoice','urgent'], due: 'Jun 15', checked: false },
      { id: 'nh-2', title: 'Confirm engineering completion milestone with FORMIC', tags: ['engineering'], due: 'Jun 20', checked: false },
      { id: 'nh-3', title: 'Begin procurement — submit BOM to vendors', tags: ['ops'], due: 'Jun 25', checked: false },
      { id: 'nh-4', title: 'Coordinate shipping to Norwalk, OH', tags: ['logistics'], due: 'Jul 20', checked: false },
    ]
  },
  {
    title: 'SPARTAN NASH',

      { id: 'sn-1', title: 'Reconcile invoicing schedule — confirm milestones', tags: ['invoice','urgent'], due: 'Jun 15', checked: false },
      { id: 'sn-2', title: 'Confirm engineering completion with Tompkins', tags: ['engineering'], due: 'Jun 20', checked: false },

    ]
  },
  {

    integrator: 'Automation Intelligence',
    status: 'no-downpayment',
    tasks: [
      { id: 'r2-1', title: 'Follow up on missing downpayment with Automation Intelligence', tags: ['invoice','urgent'], due: 'Jun 12', checked: false },
      { id: 'r2-2', title: 'Verify / confirm Flint, MI ship-to address', tags: ['ops'], due: 'Jun 15', checked: false },
      { id: 'r2-3', title: 'Do not begin procurement until downpayment received', tags: ['urgent'], due: null, checked: false },
      { id: 'r2-4', title: 'Prepare first shipment invoice ($23,193) — hold until PO clears', tags: ['invoice'], due: 'Aug 17', checked: false },
    ]
  },
  {
    title: 'AMAZON CANADA',
    integrator: 'SJF',
    status: 'pre-procurement',
    tasks: [
      { id: 'ac-1', title: 'Begin engineering phase — assign drawing resources', tags: ['engineering'], due: 'Jun 20', checked: false },
      { id: 'ac-2', title: 'Confirm Canadian customs / freight broker for Winnipeg', tags: ['logistics'], due: 'Jul 1', checked: false },
      { id: 'ac-3', title: 'Issue engineering completion invoice ($53,356.80)', tags: ['invoice'], due: 'Jul 15', checked: false },
      { id: 'ac-4', title: 'Coordinate RYDER receiving in Winnipeg, MB', tags: ['logistics'], due: 'Aug 20', checked: false },
    ]
  },
];

// ── State ──
let activeFilter = 'all';
const checkedState = {};
projectTasks.forEach(p => p.tasks.forEach(t => { checkedState[t.id] = t.checked; }));

function countOpen() {
  let open = 0, done = 0;
  projectTasks.forEach(p => p.tasks.forEach(t => {
    checkedState[t.id] ? done++ : open++;
  }));
  return { open, done };
}

function projectProgress(p) {
  const total = p.tasks.length;
  const done = p.tasks.filter(t => checkedState[t.id]).length;
  return { total, done };
}

function render() {
  const container = document.getElementById('tasks-container');
  container.innerHTML = '';

  const filtered = activeFilter === 'all'
    ? projectTasks
    : projectTasks.filter(p => p.status === activeFilter);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="tasks-empty">No projects match this filter.</div>';
    return;
  }

  filtered.forEach(proj => {
    const { total, done } = projectProgress(proj);
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    const color = STATUS_COLORS[proj.status] || '#999';

    const block = document.createElement('div');
    block.className = 'project-task-block';
    block.dataset.status = proj.status;

    // Header
    const header = document.createElement('div');
    header.className = 'ptb-header';
    header.innerHTML =
      '<div class="ptb-header-left">' +
        '<div class="ptb-status-dot" style="background:' + color + ';box-shadow:0 0 5px ' + color + ';"></div>' +
        '<div>' +
          '<div class="ptb-title">' + proj.title + '</div>' +
          '<div class="ptb-integrator">via ' + proj.integrator + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="ptb-header-right">' +
        '<div class="ptb-progress">' +
          '<div class="ptb-progress-bar"><div class="ptb-progress-fill" style="width:' + pct + '%;background:' + color + ';"></div></div>' +
          '<span class="ptb-progress-text">' + done + ' / ' + total + '</span>' +
        '</div>' +
        '<span class="ptb-toggle open">▲</span>' +
      '</div>';
    block.appendChild(header);

    // Task list
    const taskList = document.createElement('div');
    taskList.className = 'ptb-tasks';

    proj.tasks.forEach(task => {
      const row = document.createElement('div');
      row.className = 'task-row';

      const isChecked = checkedState[task.id];
      const check = document.createElement('div');
      check.className = 'task-check' + (isChecked ? ' checked' : '');
      check.addEventListener('click', () => {
        checkedState[task.id] = !checkedState[task.id];
        render();
        updateStats();
      });

      const body = document.createElement('div');
      body.className = 'task-body';

      let metaHTML = '';
      if (task.tags) {
        task.tags.forEach(tag => { metaHTML += '<span class="task-tag ' + tag + '">' + tag + '</span>'; });
      }
      if (task.due) {
        const isOverdue = false; // could add real date logic
        metaHTML += '<span class="task-due' + (isOverdue ? ' overdue' : '') + '">Due ' + task.due + '</span>';
      }

      body.innerHTML =
        '<div class="task-title' + (isChecked ? ' done' : '') + '">' + task.title + '</div>' +
        (metaHTML ? '<div class="task-meta">' + metaHTML + '</div>' : '');

      row.appendChild(check);
      row.appendChild(body);
      taskList.appendChild(row);
    });

    block.appendChild(taskList);

    // Toggle collapse
    header.addEventListener('click', () => {
      const tgl = header.querySelector('.ptb-toggle');
      taskList.classList.toggle('collapsed');
      tgl.classList.toggle('open');
    });

    container.appendChild(block);
  });

  updateStats();
}

function updateStats() {
  const { open, done } = countOpen();
  document.getElementById('stat-open').textContent = open;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-projects').textContent = projectTasks.length;
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('footer-date').textContent =
  new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

render();
</script>
</body>
</html>
